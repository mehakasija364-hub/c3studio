<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Contact Us — C3 Studio</title>
<meta name="description" content="Get in touch with C3 Studio for custom gift hampers, bulk orders and more.">
<link rel="icon" href="/images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&family=Great+Vibes&display=swap">
<link rel="stylesheet" href="/assets/styles-D3NVSlnM.css">
<style>
:root{--radius:.75rem;--background:oklch(98.5% .012 60);--foreground:oklch(30% .05 25);--card:oklch(100% 0 0);--card-foreground:oklch(30% .05 25);--primary:oklch(55% .13 18);--primary-foreground:oklch(98% .01 60);--primary-glow:oklch(70% .15 18);--secondary:oklch(93% .025 30);--secondary-foreground:oklch(30% .05 25);--muted:oklch(93% .02 30);--muted-foreground:oklch(50% .04 25);--accent:oklch(72% .12 70);--accent-foreground:oklch(30% .05 25);--border:oklch(90% .02 30);--input:oklch(90% .02 30);--ring:oklch(72% .12 70);--gradient-gold:linear-gradient(135deg,#e8c79a,#c9954f);--gradient-blush:linear-gradient(180deg,#fdf9f5 0%,#f6e1d6 100%);--gradient-luxe:linear-gradient(135deg,#f4e0d8 0%,#ecc5b8 50%,#d8a880 100%);--shadow-soft:0 4px 24px -8px #8c28372e;--shadow-luxe:0 20px 60px -20px #78283240;--shadow-gold:0 8px 30px -10px #d49a5e66}
body{font-family:var(--font-body);background:var(--background);color:var(--foreground);margin:0}
.marquee{overflow:hidden}.marquee-track{display:flex;gap:3rem;white-space:nowrap;animation:marquee 5s linear infinite}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
</style>
</head>
<body>
<div id="nav-root"></div>
<section class="page-banner">
  <div class="container-x">
    <div class="label">Get in Touch</div>
    <h1>Contact Us</h1>
    <p>We'd love to craft something beautiful for you.</p>
  </div>
</section>
<section class="container-x contact-grid">
  <div>
    <div class="info-card">
      <div class="info-icon">📍</div>
      <div>
        <div style="font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-foreground)">Visit</div>
        <div id="addr"></div>
      </div>
    </div>
    <div class="info-card">
      <div class="info-icon">📞</div>
      <div>
        <div style="font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-foreground)">Call</div>
        <div><a id="phoneLink" href="#"></a></div>
      </div>
    </div>
    <div class="info-card">
      <div class="info-icon">✉</div>
      <div>
        <div style="font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted-foreground)">Email</div>
        <div><a id="emailLink" href="#"></a></div>
      </div>
    </div>
    <a id="waCard" href="#" target="_blank" rel="noreferrer" class="wa-card">
      <div style="font-size:2rem">💬</div>
      <h3 style="font-size:1.25rem;font-family:var(--font-display);margin-top:.4rem">Chat on WhatsApp</h3>
      <p style="font-size:11px;letter-spacing:.1em;margin-top:.25rem">QUICKEST WAY TO REACH US</p>
    </a>
  </div>
  <form class="form-card" onsubmit="sendMessage(event)">
    <h2>Send a Message</h2>
    <div class="field"><label>Name</label><input name="name" required placeholder="Your name"></div>
    <div class="field"><label>Email</label><input name="email" type="email" required placeholder="you@example.com"></div>
    <div class="field"><label>Phone</label><input name="phone" type="tel" placeholder="+91"></div>
    <div class="field"><label>Message</label><textarea name="message" required placeholder="Tell us about your gifting needs"></textarea></div>
    <button type="submit" class="btn btn-primary" style="width:100%">Send Message</button>
  </form>
</section>
<div id="footer-root"></div>
<script src="/assets/site.js"></script>
<script>
document.getElementById('nav-root').innerHTML = navHTML('contact');
document.getElementById('footer-root').innerHTML = footerHTML();
document.getElementById('addr').textContent = ADDRESS;
document.getElementById('phoneLink').href = 'tel:' + PHONE.replace(/\s+/g,'');
document.getElementById('phoneLink').textContent = PHONE;
document.getElementById('emailLink').href = 'mailto:' + EMAIL;
document.getElementById('emailLink').textContent = EMAIL;
document.getElementById('waCard').href = 'https://wa.me/' + WA;
function sendMessage(e){
  e.preventDefault();
  const fd = new FormData(e.target);
  const text = `Hi C3 Studio! 🌸\n\nName: ${fd.get('name')}\nEmail: ${fd.get('email')}\nPhone: ${fd.get('phone')}\n\n${fd.get('message')}`;
  window.open('https://wa.me/'+WA+'?text='+encodeURIComponent(text),'_blank');
}
updateCartCount();
window.addEventListener('cart:update', updateCartCount);
</script>
</body>
</html>
