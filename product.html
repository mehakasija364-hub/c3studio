<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Product — C3 Studio</title>
<meta name="description" content="Premium gift hampers by C3 Studio.">
<link rel="icon" href="/images/logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@400;500;600&family=Great+Vibes&display=swap">
<link rel="stylesheet" href="/assets/styles-D3NVSlnM.css">
<style>
:root{--radius:.75rem;--background:oklch(98.5% .012 60);--foreground:oklch(30% .05 25);--card:oklch(100% 0 0);--card-foreground:oklch(30% .05 25);--primary:oklch(55% .13 18);--primary-foreground:oklch(98% .01 60);--primary-glow:oklch(70% .15 18);--secondary:oklch(93% .025 30);--secondary-foreground:oklch(30% .05 25);--muted:oklch(93% .02 30);--muted-foreground:oklch(50% .04 25);--accent:oklch(72% .12 70);--accent-foreground:oklch(30% .05 25);--border:oklch(90% .02 30);--input:oklch(90% .02 30);--ring:oklch(72% .12 70);--gradient-gold:linear-gradient(135deg,#e8c79a,#c9954f);--gradient-blush:linear-gradient(180deg,#fdf9f5 0%,#f6e1d6 100%);--gradient-luxe:linear-gradient(135deg,#f4e0d8 0%,#ecc5b8 50%,#d8a880 100%);--shadow-soft:0 4px 24px -8px #8c28372e;--shadow-luxe:0 20px 60px -20px #78283240;--shadow-gold:0 8px 30px -10px #d49a5e66}
body{font-family:var(--font-body);background:var(--background);color:var(--foreground);margin:0}
.marquee{overflow:hidden}.marquee-track{display:flex;gap:3rem;white-space:nowrap;animation:marquee 5s linear infinite}
@keyframes marquee{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}

/* Product image slider */
.pdp-slider{position:relative;overflow:hidden;border-radius:var(--radius);background:var(--secondary)}
.pdp-slides{display:flex;transition:transform .35s ease}
.pdp-slide{min-width:100%;aspect-ratio:1/1}
.pdp-slide img{width:100%;height:100%;object-fit:cover;display:block;border-radius:var(--radius)}
.pdp-arrow{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.82);border:none;border-radius:50%;width:38px;height:38px;font-size:20px;cursor:pointer;z-index:10;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:background .2s}
.pdp-arrow:hover{background:#fff}
.pdp-arrow.prev{left:10px}
.pdp-arrow.next{right:10px}
.pdp-dots{display:flex;justify-content:center;gap:6px;margin-top:.6rem}
.pdp-dots span{width:8px;height:8px;border-radius:50%;background:var(--border);cursor:pointer;transition:background .2s}
.pdp-dots span.active{background:var(--primary)}
.pdp-thumbs{display:flex;gap:.5rem;margin-top:.75rem;overflow-x:auto;padding-bottom:4px}
.pdp-thumbs button{flex-shrink:0;border:2px solid transparent;padding:0;border-radius:10px;overflow:hidden;cursor:pointer;background:none;transition:border-color .2s}
.pdp-thumbs button.active{border-color:var(--primary)}
.pdp-thumbs img{width:72px;height:72px;object-fit:cover;display:block}
@media(max-width:640px){
  .pdp-thumbs img{width:56px;height:56px}
  .pdp-arrow{width:30px;height:30px;font-size:16px}
}
</style>
</head>
<body>
<div id="nav-root"></div>
<div id="page-root"></div>
<div id="footer-root"></div>

<script src="/assets/site.js"></script>
<script>
document.getElementById('nav-root').innerHTML = navHTML('');
document.getElementById('footer-root').innerHTML = footerHTML();

const slug = new URLSearchParams(location.search).get('slug');
const product = PRODUCTS.find(p=>p.slug===slug);

if(!product) {
  document.getElementById('page-root').innerHTML=`
    <div style="text-align:center;padding:5rem 1rem">
      <h1 style="font-size:2.5rem;font-family:var(--font-display)">Hamper not found</h1>
      <a href="/shop.html" class="btn btn-primary" style="margin-top:1.5rem">Back to Shop</a>
    </div>`;
} else {
  document.title = product.name + ' — C3 Studio';
  const imgs = Array.isArray(product.image) ? product.image : [product.image];
  const cat = Array.isArray(product.category) ? product.category.join(' · ') : product.category;
  const hasMultiple = imgs.length > 1;

  // Related products
  const pCats = normArr(product.category).concat(normArr(product.subcategory));
  const catSet = new Set(pCats);
  let related = PRODUCTS.filter(p=>p.id!==product.id&&normArr(p.category).concat(normArr(p.subcategory)).some(c=>catSet.has(c))).slice(0,4);
  if(!related.length) related = PRODUCTS.filter(p=>p.id!==product.id).slice(0,4);

  const sliderHTML = `
    <div class="pdp-slider" id="pdpSlider">
      <div class="pdp-slides" id="pdpSlides">
        ${imgs.map(src=>`<div class="pdp-slide"><img src="${src}" alt="${product.name}" fetchpriority="high"></div>`).join('')}
      </div>
      ${hasMultiple ? `
      <button class="pdp-arrow prev" onclick="pdpGo(pdpCur-1)">‹</button>
      <button class="pdp-arrow next" onclick="pdpGo(pdpCur+1)">›</button>
      ` : ''}
    </div>
    ${hasMultiple ? `<div class="pdp-dots" id="pdpDots">${imgs.map((_,i)=>`<span class="${i===0?'active':''}" onclick="pdpGo(${i})"></span>`).join('')}</div>` : ''}
    ${hasMultiple ? `<div class="pdp-thumbs" id="pdpThumbs">
      ${imgs.map((src,i)=>`<button class="${i===0?'active':''}" onclick="pdpGo(${i})" id="pdpThumb${i}"><img src="${src}" alt=""></button>`).join('')}
    </div>` : ''}
  `;

  document.getElementById('page-root').innerHTML=`
    <div class="container-x" style="padding-top:1.5rem">
      <a href="/shop.html" style="font-size:11px;letter-spacing:.2em;text-transform:uppercase">← Back to Shop</a>
    </div>
    <section class="container-x product-grid">
      <div>
        ${sliderHTML}
      </div>
      <div class="product-info">
        <div class="product-cat">${cat}</div>
        <h1>${product.name}</h1>
        <div class="product-tag">${product.tagline}</div>
        <div class="product-price">
          <span class="price">${fmtPrice(product.price)}</span>
          ${product.oldPrice?`<span class="price-old" style="font-size:1.1rem">${fmtPrice(product.oldPrice)}</span><span class="save-tag">Save ${fmtPrice(product.oldPrice-product.price)}</span>`:''}
        </div>
        <p class="product-desc">${product.description}</p>
        <ul class="detail-list">
          ${product.details.map(d=>`<li><span class="detail-check">✓</span>${d}</li>`).join('')}
        </ul>
        <div class="qty-cta">
          <div class="qty-control">
            <button onclick="changeQty(-1)">−</button>
            <span id="qtyVal">1</span>
            <button onclick="changeQty(1)">+</button>
          </div>
          <button class="btn btn-dark" onclick="addToCartPDP()">🛍 Add to Cart</button>
          <a href="${waCustomise(product)}" target="_blank" rel="noreferrer" class="btn btn-gold">✨ Customise This Hamper</a>
          <a href="${waOrder(product)}" target="_blank" rel="noreferrer" class="btn btn-primary">💬 Order on WhatsApp</a>
        </div>
      </div>
    </section>
    <section class="container-x section">
      <h2 style="font-family:var(--font-display);font-size:2rem;margin-bottom:2rem">You may also love</h2>
      <div class="grid-products">${related.map(p=>productCardHTML(p)).join('')}</div>
    </section>`;

  // Slider logic
  let pdpCur = 0;
  const totalImgs = imgs.length;
  window.pdpGo = function(n) {
    pdpCur = ((n % totalImgs) + totalImgs) % totalImgs;
    document.getElementById('pdpSlides').style.transform = `translateX(-${pdpCur*100}%)`;
    if(document.getElementById('pdpDots')) {
      document.querySelectorAll('#pdpDots span').forEach((s,i)=>s.classList.toggle('active',i===pdpCur));
    }
    document.querySelectorAll('[id^="pdpThumb"]').forEach((b,i)=>b.classList.toggle('active',i===pdpCur));
  };

  // Touch/swipe support
  let ts=0, tx=0;
  const sliderEl = document.getElementById('pdpSlider');
  if(sliderEl && hasMultiple) {
    sliderEl.addEventListener('touchstart',e=>{ts=e.touches[0].clientX;tx=ts;},{passive:true});
    sliderEl.addEventListener('touchmove',e=>{tx=e.touches[0].clientX;},{passive:true});
    sliderEl.addEventListener('touchend',()=>{const d=ts-tx;if(Math.abs(d)>40)window.pdpGo(d>0?pdpCur+1:pdpCur-1);});
  }

  let qty = 1;
  window.changeQty = function(d){qty=Math.max(1,qty+d);document.getElementById('qtyVal').textContent=qty;}
  window.addToCartPDP = function(){cartAdd(product.id,qty);showToast('Added to cart ✓');}
}

updateCartCount();
window.addEventListener('cart:update', updateCartCount);
</script>
</body>
</html>
